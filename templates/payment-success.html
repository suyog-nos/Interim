{% extends "base.html" %}

{% block content %}
<div class="container mt-5 text-center">
    <div class="card p-5 shadow-sm">
        <div class="mb-4">
            <i class="fas fa-check-circle fa-5x text-success"></i>
        </div>
        <h1 class="display-4 text-success mb-3">Payment Successful!</h1>
        <p class="lead">Thank you for your order.</p>
        {% if order_id %}
        <p class="mb-4">Your order number is: <strong>#{{ order_id }}</strong></p>
        {% endif %}
        <div class="d-flex justify-content-center gap-3">
            <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg">Continue Shopping</a>
            <a href="{{ url_for('main.orders') }}" class="btn btn-outline-secondary btn-lg ml-2">View Orders</a>
        </div>
    </div>
</div>
{% endblock %}
